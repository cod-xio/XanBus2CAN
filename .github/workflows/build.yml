name: Build & Release

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  firmware:
    name: "Firmware / ${{ matrix.env }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: esp32dev
            label: "ESP32 DevKit v1"
          - env: esp32-c3
            label: "ESP32-C3 SuperMini"

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ matrix.env }}-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install platformio

      - name: Build ${{ matrix.label }}
        run: pio run --environment ${{ matrix.env }}

      - name: Firmware size
        run: |
          echo "### ${{ matrix.label }}" >> $GITHUB_STEP_SUMMARY
          pio run --environment ${{ matrix.env }} --target size 2>/dev/null \
            | tee -a $GITHUB_STEP_SUMMARY || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.elf
          retention-days: 30

  python:
    name: Python Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile python/xanbus_bridge.py && echo "✅ Syntax OK"
      - name: Demo-Mode (5s)
        run: timeout 5 python python/xanbus_bridge.py --demo || [ $? -eq 124 ]

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ firmware, python ]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
      - name: Rename binaries
        run: |
          mkdir -p dist
          for env in esp32dev esp32-c3; do
            src="release/firmware-${env}/firmware.bin"
            [ -f "$src" ] && cp "$src" "dist/xanbus2can_${env}_${{ github.ref_name }}.bin"
          done
          ls -lh dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "XanBus2CAN ${{ github.ref_name }}"
          body: |
            ## XanBus2CAN ${{ github.ref_name }}

            ### ⚡ Vor dem Flashen: WiFi eintragen!
            In `src/main.cpp`:
            ```cpp
            #define CFG_WIFI_SSID     "DEIN_WLAN_NAME"
            #define CFG_WIFI_PASSWORD "DEIN_WLAN_PASSWORT"
            #define CFG_MQTT_BROKER   "192.168.1.xxx"
            ```
            Danach: **http://xanbus.local** im Browser → alle Einstellungen änderbar ohne Neu-Flashen.

            | Datei | Board |
            |-------|-------|
            | `xanbus2can_esp32dev_*.bin`  | ESP32 DevKit v1 |
            | `xanbus2can_esp32-c3_*.bin`  | ESP32-C3 SuperMini |

            ### Flashen
            ```bash
            esptool.py --chip esp32   --port /dev/ttyUSB0 write_flash 0x0 xanbus2can_esp32dev_*.bin
            esptool.py --chip esp32c3 --port /dev/ttyUSB0 write_flash 0x0 xanbus2can_esp32-c3_*.bin
            ```
          files: dist/*.bin
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
